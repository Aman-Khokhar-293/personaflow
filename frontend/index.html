<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonaFlow - AI Conversation Agents</title>
    <meta name="description"
        content="Create custom AI conversation agents with unique personalities. Chat or video call with your agents and share them with others.">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="image/favicon.png">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<script>
    // Apply dark mode immediately to prevent flash
    (function () {
        if (localStorage.getItem('personaflow-theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    })();
</script>

<body>
    <!-- App Container -->
    <div id="app">
        <!-- Sidebar (hidden on auth pages) -->
        <aside id="sidebar" class="sidebar hidden">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="image/favicon.png" alt="PersonaFlow" class="logo-img">
                    <div style="display: flex; flex-direction: column;">
                        <span class="logo-text">PersonaFlow</span>
                        <span class="logo-subtitle">Dynamic AI Platform</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#/dashboard" class="nav-item" data-page="dashboard">
                    <span class="nav-icon"><i class="fas fa-th-large"></i></span>
                    <span class="nav-label">Dashboard</span>
                    <span class="nav-chevron"><i class="fas fa-chevron-right"></i></span>
                </a>
                <a href="#/agents" class="nav-item" data-page="agents">
                    <span class="nav-icon"><i class="fas fa-robot"></i></span>
                    <span class="nav-label">My Agents</span>
                    <span class="nav-chevron"><i class="fas fa-chevron-right"></i></span>
                </a>
                <a href="#/conversations" class="nav-item" data-page="conversations">
                    <span class="nav-icon"><i class="fas fa-comments"></i></span>
                    <span class="nav-label">Conversations</span>
                    <span class="nav-chevron"><i class="fas fa-chevron-right"></i></span>
                </a>
                <a href="#/reports" class="nav-item" data-page="reports">
                    <span class="nav-icon"><i class="fas fa-clipboard-list"></i></span>
                    <span class="nav-label">Reports</span>
                    <span class="nav-chevron"><i class="fas fa-chevron-right"></i></span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="dark-mode-row">
                    <div class="dark-mode-label">
                        <i class="fas fa-moon" id="dark-mode-icon"></i>
                        <span>Dark Mode</span>
                    </div>
                    <div class="dark-mode-switch" id="dark-mode-toggle" title="Toggle Dark Mode"></div>
                </div>
                <div class="user-info" id="user-info">
                    <div class="user-avatar" id="user-avatar">AK</div>
                    <div class="user-details">
                        <span class="user-name" id="user-name">User</span>
                        <span class="user-email" id="user-email"></span>
                    </div>
                    <button class="logout-btn" id="logout-btn" title="Logout"><i
                            class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <!-- Dynamic content loaded here -->
        </main>
    </div>

    <!-- Modal Container -->
    <div id="modal-container" class="modal-container hidden">
        <div class="modal-backdrop"></div>
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Modal Title</h3>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content -->
            </div>
            <div class="modal-footer" id="modal-footer">
                <!-- Modal actions -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Three.js for 3D Avatar -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.142.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.142.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.142.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.142.0/examples/js/loaders/RGBELoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.142.0/examples/js/libs/fflate.min.js"></script>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script src="js/router.js"></script>
    <script src="js/components/sidebar.js"></script>
    <script src="js/components/modal.js"></script>
    <script src="js/components/toast.js"></script>
    <script src="js/components/three-converter.js"></script>
    <script src="js/components/lipsync-engine.js"></script>
    <script src="js/components/avatar3d.js"></script>
    <script src="js/components/onboarding.js"></script>
    <script src="js/components/notifications.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/signup.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/agents.js"></script>
    <script src="js/pages/agent-wizard.js"></script>
    <script src="js/pages/agent-detail.js"></script>
    <script src="js/pages/chat.js"></script>
    <script src="js/pages/video-call.js"></script>
    <script src="js/pages/conversations.js"></script>
    <script src="js/pages/reports.js"></script>
    <script src="js/pages/share-access.js"></script>
    <script src="js/pages/anchoring.js"></script>
    <script src="js/pages/anchoring-remote.js"></script>
    <script src="js/pages/templates.js"></script>
    <script>
        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
</body>

</html>
